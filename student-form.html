<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Form - Edu ERP System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
                <i class="bi bi-mortarboard-fill text-info me-2 fs-3"></i>
                <span>Edu ERP System</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto ms-lg-4">
                    <li class="nav-item">
                        <a class="nav-link px-3" href="dashboard.html">
                            <i class="bi bi-speedometer2 me-1"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" href="students.html">
                            <i class="bi bi-people-fill me-1"></i> View Students
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active px-3" href="student-form.html">
                            <i class="bi bi-person-plus-fill me-1"></i> Add Student
                        </a>
                    </li>
                </ul>
                <div class="d-flex align-items-center text-white">
                    <div class="me-3 text-end d-none d-sm-block">
                        <div class="fw-bold">Administrator</div>
                        <small class="text-info">ADMIN</small>
                    </div>
                    <button onclick="logout()" class="btn btn-outline-light btn-sm rounded-pill px-3">
                        <i class="bi bi-box-arrow-right me-1"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container main-content my-4">

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-header bg-dark text-white p-4 d-flex justify-content-between align-items-center">
                        <div>
                            <h4 class="fw-bold mb-0" id="formTitle">
                                <i class="bi bi-person-plus-fill text-info me-2"></i>Register New Student
                            </h4>
                            <small class="text-white-50">Enter academic and contact information</small>
                        </div>
                        <a href="students.html" class="btn btn-outline-light btn-sm rounded-pill">
                            <i class="bi bi-arrow-left me-1"></i> Back to Directory
                        </a>
                    </div>

                    <div class="card-body p-4 p-md-5 bg-white">
                        <form id="studentForm">
                            <input type="hidden" id="studentId">

                            <div class="row g-3">
                                
                                <div class="col-md-6">
                                    <label for="studentCode" class="form-label font-weight-semibold">Student Code / Roll ID</label>
                                    <input type="text" class="form-control" id="studentCode" placeholder="e.g. STU-1007" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="enrollmentDate" class="form-label font-weight-semibold">Enrollment Date</label>
                                    <input type="date" class="form-control" id="enrollmentDate" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="firstName" class="form-label font-weight-semibold">First Name</label>
                                    <input type="text" class="form-control" id="firstName" placeholder="First Name" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="lastName" class="form-label font-weight-semibold">Last Name</label>
                                    <input type="text" class="form-control" id="lastName" placeholder="Last Name" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="email" class="form-label font-weight-semibold">Email Address</label>
                                    <input type="email" class="form-control" id="email" placeholder="student@university.edu" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="phone" class="form-label font-weight-semibold">Phone Number</label>
                                    <input type="text" class="form-control" id="phone" placeholder="+91 9876543210" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="department" class="form-label font-weight-semibold">Department</label>
                                    <select class="form-select" id="department" required>
                                        <option value="" disabled selected>Select Department</option>
                                        <option value="Computer Science">Computer Science</option>
                                        <option value="Information Technology">Information Technology</option>
                                        <option value="Electronics">Electronics</option>
                                        <option value="Mechanical Eng">Mechanical Eng</option>
                                        <option value="Data Science">Data Science</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label for="course" class="form-label font-weight-semibold">Degree / Course</label>
                                    <input type="text" class="form-control" id="course" placeholder="e.g. B.Tech CSE" required>
                                </div>

                                <div class="col-md-12">
                                    <label for="gpa" class="form-label font-weight-semibold">Cumulative CGPA (0.00 - 10.00 Scale)</label>
                                    <input type="number" step="0.01" min="0" max="10.0" class="form-control" id="gpa" placeholder="e.g. 9.45" required>
                                </div>

                            </div>

                            <hr class="my-4">

                            <div class="d-flex justify-content-end gap-3">
                                <a href="students.html" class="btn btn-outline-secondary px-4">Cancel</a>
                                <button type="submit" class="btn btn-primary-custom px-5" id="submitBtn">
                                    <i class="bi bi-check-circle me-1"></i> Save Student
                                </button>
                            </div>

                        </form>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer class="text-center">
        <div class="container">
            <p class="mb-0 fw-bold">DEVELOPED BY ROHAN PATTNAIK</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();

            document.getElementById('enrollmentDate').valueAsDate = new Date();

            const urlParams = new URLSearchParams(window.location.search);
            const editId = urlParams.get('id');

            if (editId) {
                const s = getStudentById(editId);
                if (s) {
                    document.getElementById('formTitle').innerHTML = `<i class="bi bi-pencil-square text-info me-2"></i>Edit Student Details`;
                    document.getElementById('submitBtn').innerHTML = `<i class="bi bi-save me-1"></i> Update Student`;
                    
                    document.getElementById('studentId').value = s.id;
                    document.getElementById('studentCode').value = s.code;
                    document.getElementById('firstName').value = s.firstName;
                    document.getElementById('lastName').value = s.lastName;
                    document.getElementById('email').value = s.email;
                    document.getElementById('phone').value = s.phone;
                    document.getElementById('department').value = s.department;
                    document.getElementById('course').value = s.course;
                    document.getElementById('gpa').value = s.gpa;
                    document.getElementById('enrollmentDate').value = s.date;
                }
            }

            document.getElementById('studentForm').addEventListener('submit', (e) => {
                e.preventDefault();

                const id = document.getElementById('studentId').value;
                const studentData = {
                    id: id ? parseInt(id) : null,
                    code: document.getElementById('studentCode').value.trim(),
                    firstName: document.getElementById('firstName').value.trim(),
                    lastName: document.getElementById('lastName').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    phone: document.getElementById('phone').value.trim(),
                    department: document.getElementById('department').value,
                    course: document.getElementById('course').value.trim(),
                    gpa: parseFloat(document.getElementById('gpa').value),
                    date: document.getElementById('enrollmentDate').value
                };

                saveStudent(studentData);
                window.location.href = 'students.html?msg=saved';
            });
        });
    </script>
</body>
</html>
