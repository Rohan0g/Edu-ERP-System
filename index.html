<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Edu ERP System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="login-bg">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card login-card p-4 p-md-5">
                    
                    <div class="text-center mb-4">
                        <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px; font-size: 1.8rem;">
                            <i class="bi bi-mortarboard-fill"></i>
                        </div>
                        <h3 class="fw-bold text-dark mb-1">Edu ERP System</h3>
                        <p class="text-muted small">Student Management & Academic Portal</p>
                    </div>

                    <div id="alertBox"></div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="username" class="form-label font-weight-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" id="username" placeholder="Enter username" required value="admin">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label font-weight-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="password" placeholder="Enter password" required value="admin123">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary-custom w-100 mb-3">
                            Sign In <i class="bi bi-arrow-right-short ms-1"></i>
                        </button>
                    </form>

                    <div class="bg-light p-3 rounded-3 text-center border mt-2">
                        <span class="badge bg-secondary mb-1">Demo Credentials</span>
                        <div class="small text-dark fw-bold">Username: <span class="text-primary">admin</span> | Password: <span class="text-primary">admin123</span></div>
                    </div>

                    <div class="text-center mt-4">
                        <small class="text-muted">Designed for Internship Presentation &copy; 2026</small>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('sms_user')) {
                window.location.href = 'dashboard.html';
            }

            document.getElementById('loginForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const u = document.getElementById('username').value.trim();
                const p = document.getElementById('password').value.trim();

                if (u === 'admin' && p === 'admin123') {
                    sessionStorage.setItem('sms_user', JSON.stringify({ username: 'admin', name: 'Administrator', role: 'ADMIN' }));
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('alertBox').innerHTML = `
                        <div class="alert alert-danger alert-dismissible fade show text-center" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>Invalid credentials! Use demo: admin / admin123
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    `;
                }
            });
        });
    </script>
</body>
</html>
